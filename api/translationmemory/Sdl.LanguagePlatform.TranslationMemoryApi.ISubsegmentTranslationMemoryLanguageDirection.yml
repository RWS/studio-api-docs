- uid: Sdl.LanguagePlatform.TranslationMemoryApi.ISubsegmentTranslationMemoryLanguageDirection.SearchSegmentsMasked(Sdl.LanguagePlatform.TranslationMemory.SearchSettings,Sdl.LanguagePlatform.TranslationMemory.SubsegmentSearchSettings,Sdl.LanguagePlatform.TranslationMemory.SubsegmentSearchCondition,Sdl.LanguagePlatform.Core.Segment[],System.Boolean[])
  commentId: M:Sdl.LanguagePlatform.TranslationMemoryApi.ISubsegmentTranslationMemoryLanguageDirection.SearchSegmentsMasked(Sdl.LanguagePlatform.TranslationMemory.SearchSettings,Sdl.LanguagePlatform.TranslationMemory.SubsegmentSearchSettings,Sdl.LanguagePlatform.TranslationMemory.SubsegmentSearchCondition,Sdl.LanguagePlatform.Core.Segment[],System.Boolean[])
  id: SearchSegmentsMasked(Sdl.LanguagePlatform.TranslationMemory.SearchSettings,Sdl.LanguagePlatform.TranslationMemory.SubsegmentSearchSettings,Sdl.LanguagePlatform.TranslationMemory.SubsegmentSearchCondition,Sdl.LanguagePlatform.Core.Segment[],System.Boolean[])
  parent: Sdl.LanguagePlatform.TranslationMemoryApi.ISubsegmentTranslationMemoryLanguageDirection
  langs:
  - csharp
  - vb
  name: SearchSegmentsMasked(SearchSettings, SubsegmentSearchSettings, SubsegmentSearchCondition, Segment[], bool[])
  nameWithType: ISubsegmentTranslationMemoryLanguageDirection.SearchSegmentsMasked(SearchSettings, SubsegmentSearchSettings, SubsegmentSearchCondition, Segment[], bool[])
  fullName: Sdl.LanguagePlatform.TranslationMemoryApi.ISubsegmentTranslationMemoryLanguageDirection.SearchSegmentsMasked(Sdl.LanguagePlatform.TranslationMemory.SearchSettings, Sdl.LanguagePlatform.TranslationMemory.SubsegmentSearchSettings, Sdl.LanguagePlatform.TranslationMemory.SubsegmentSearchCondition, Sdl.LanguagePlatform.Core.Segment[], bool[])
  type: Method
  assemblies:
  - Sdl.LanguagePlatform.TranslationMemoryApi
  namespace: Sdl.LanguagePlatform.TranslationMemoryApi
  summary: >-
    Performs a segment-level search, and optionally a subsegment search, for an array of segments, specifying a mask which specifies which segments should actually be

    searched (only those for which the corresponding mask bit is <code>true</code> are searched). If the mask is <code>null</code>, the method

    search all segments. Passing a mask only makes sense in document search contexts (<xref href="Sdl.LanguagePlatform.TranslationMemory.SearchSettings.IsDocumentSearch" data-throw-if-not-resolved="false"></xref>

    set to <code>true</code>).
  example: []
  syntax:
    content: SegmentAndSubsegmentSearchResults[] SearchSegmentsMasked(SearchSettings settings, SubsegmentSearchSettings subsegmentSettings, SubsegmentSearchCondition condition, Segment[] segments, bool[] mask)
    parameters:
    - id: settings
      type: Sdl.LanguagePlatform.TranslationMemory.SearchSettings
      description: The settings that define the segment-level search parameters.
    - id: subsegmentSettings
      type: Sdl.LanguagePlatform.TranslationMemory.SubsegmentSearchSettings
      description: The settings that define the subsegment search parameters, or null if a subsegment search should not be performed.
    - id: condition
      type: Sdl.LanguagePlatform.TranslationMemory.SubsegmentSearchCondition
      description: If <code class="paramref">subsegmentSettings</code> is not null, specifies the conditions under which a subsegment search will be performed.
    - id: segments
      type: Sdl.LanguagePlatform.Core.Segment[]
      description: The array containing the segments to search for.
    - id: mask
      type: System.Boolean[]
      description: The array containing the segments to search for.
    return:
      type: Sdl.LanguagePlatform.TranslationMemory.SegmentAndSubsegmentSearchResults[]
      description: >-
        An array of <xref href="Sdl.LanguagePlatform.TranslationMemory.SearchResults" data-throw-if-not-resolved="false"></xref> objects, which mirrors the segments array. It has the exact same size and contains the
                    search results for each segment with the same index within the segments array.
    content.vb: Function SearchSegmentsMasked(settings As SearchSettings, subsegmentSettings As SubsegmentSearchSettings, condition As SubsegmentSearchCondition, segments As Segment(), mask As Boolean()) As SegmentAndSubsegmentSearchResults()
  overload: Sdl.LanguagePlatform.TranslationMemoryApi.ISubsegmentTranslationMemoryLanguageDirection.SearchSegmentsMasked*
  nameWithType.vb: ISubsegmentTranslationMemoryLanguageDirection.SearchSegmentsMasked(SearchSettings, SubsegmentSearchSettings, SubsegmentSearchCondition, Segment(), Boolean())
  fullName.vb: Sdl.LanguagePlatform.TranslationMemoryApi.ISubsegmentTranslationMemoryLanguageDirection.SearchSegmentsMasked(Sdl.LanguagePlatform.TranslationMemory.SearchSettings, Sdl.LanguagePlatform.TranslationMemory.SubsegmentSearchSettings, Sdl.LanguagePlatform.TranslationMemory.SubsegmentSearchCondition, Sdl.LanguagePlatform.Core.Segment(), Boolean())
  name.vb: SearchSegmentsMasked(SearchSettings, SubsegmentSearchSettings, SubsegmentSearchCondition, Segment(), Boolean())
