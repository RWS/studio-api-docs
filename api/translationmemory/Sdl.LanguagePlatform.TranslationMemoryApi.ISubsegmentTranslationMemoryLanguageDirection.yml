  parent: Sdl.LanguagePlatform.TranslationMemoryApi.ISubsegmentTranslationMemoryLanguageDirection
  langs:
  - csharp
  - vb
  name: SearchTranslationUnitsMasked(SearchSettings, SubsegmentSearchSettings, SubsegmentSearchCondition, TranslationUnit[], bool[])
  nameWithType: ISubsegmentTranslationMemoryLanguageDirection.SearchTranslationUnitsMasked(SearchSettings, SubsegmentSearchSettings, SubsegmentSearchCondition, TranslationUnit[], bool[])
  fullName: Sdl.LanguagePlatform.TranslationMemoryApi.ISubsegmentTranslationMemoryLanguageDirection.SearchTranslationUnitsMasked(Sdl.LanguagePlatform.TranslationMemory.SearchSettings, Sdl.LanguagePlatform.TranslationMemory.SubsegmentSearchSettings, Sdl.LanguagePlatform.TranslationMemory.SubsegmentSearchCondition, Sdl.LanguagePlatform.TranslationMemory.TranslationUnit[], bool[])
  type: Method
  assemblies:
  - Sdl.LanguagePlatform.TranslationMemoryApi
  namespace: Sdl.LanguagePlatform.TranslationMemoryApi
  summary: >-
    Performs a translation unit search, and optionally a subsegment search on the source segment, for an array of translation units, allows passing a mask which specifies which TUs are actually searched. This is useful

    in document search contexts where some TUs are passed which should be used to establish a (text) context, but which should not be

    processed.
  example: []
  syntax:
    content: SegmentAndSubsegmentSearchResults[] SearchTranslationUnitsMasked(SearchSettings settings, SubsegmentSearchSettings subsegmentSettings, SubsegmentSearchCondition condition, TranslationUnit[] translationUnits, bool[] mask)
    parameters:
    - id: settings
      type: Sdl.LanguagePlatform.TranslationMemory.SearchSettings
      description: The settings that define the segment-level search parameters.
    - id: subsegmentSettings
      type: Sdl.LanguagePlatform.TranslationMemory.SubsegmentSearchSettings
      description: The settings that define the subsegment search parameters, or null if a subsegment search should not be performed.
    - id: condition
      type: Sdl.LanguagePlatform.TranslationMemory.SubsegmentSearchCondition
      description: If <code class="paramref">subsegmentSettings</code> is not null, specifies the conditions under which a subsegment search will be performed.
    - id: translationUnits
      type: Sdl.LanguagePlatform.TranslationMemory.TranslationUnit[]
      description: The array containing the translation units to search for.
    - id: mask
      type: System.Boolean[]
      description: >-
        A <code>bool</code> array which specifies which TUs are actually searched (mask[i] = <code>true</code>). If <code>null</code>, the method
                    will search all translation units.
    return:
      type: Sdl.LanguagePlatform.TranslationMemory.SegmentAndSubsegmentSearchResults[]
      description: >-
        An array of objects, which mirrors the translation unit array. It has the exact same size and contains
                    the search results for each translation unit with the same index within the translation unit array.
    content.vb: Function SearchTranslationUnitsMasked(settings As SearchSettings, subsegmentSettings As SubsegmentSearchSettings, condition As SubsegmentSearchCondition, translationUnits As TranslationUnit(), mask As Boolean()) As SegmentAndSubsegmentSearchResults()
  overload: Sdl.LanguagePlatform.TranslationMemoryApi.ISubsegmentTranslationMemoryLanguageDirection.SearchTranslationUnitsMasked*
  nameWithType.vb: ISubsegmentTranslationMemoryLanguageDirection.SearchTranslationUnitsMasked(SearchSettings, SubsegmentSearchSettings, SubsegmentSearchCondition, TranslationUnit(), Boolean())
  fullName.vb: Sdl.LanguagePlatform.TranslationMemoryApi.ISubsegmentTranslationMemoryLanguageDirection.SearchTranslationUnitsMasked(Sdl.LanguagePlatform.TranslationMemory.SearchSettings, Sdl.LanguagePlatform.TranslationMemory.SubsegmentSearchSettings, Sdl.LanguagePlatform.TranslationMemory.SubsegmentSearchCondition, Sdl.LanguagePlatform.TranslationMemory.TranslationUnit(), Boolean())
  name.vb: SearchTranslationUnitsMasked(SearchSettings, SubsegmentSearchSettings, SubsegmentSearchCondition, TranslationUnit(), Boolean())
